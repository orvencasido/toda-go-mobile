<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toda Go App</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Experience the futurist and aesthetic Toda Go App. Sleek, fast, and modern.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --accent: #06b6d4;
            --bg-dark: #0f172a;
            --text-main: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background */
        .page-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), url('bg.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
            transform: scale(1.1);
            animation: backgroundFloat 20s infinite alternate ease-in-out;
        }

        @keyframes backgroundFloat {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.1) translate(-2%, -2%); }
        }

        /* Glowing Blobs for extra premium feel */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            animation: float 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 { top: -100px; right: -100px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); }
        .blob-2 { bottom: -100px; left: -100px; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Main Container */
        .container {
            position: relative;
            padding: 3rem;
            border-radius: 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 90%;
            width: 480px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            cursor: default;
        }

        .container:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), 0 0 20px rgba(79, 70, 229, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Typography */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 2rem;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both;
        }

        /* Button-like element for extra flair */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, #4338ca 100%);
            border-radius: 99rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
        }

        .cta:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, #6366f1 0%, var(--primary) 100%);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pulse light effect on center */
        .pulse-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 1px;
            background: white;
            box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.05);
            z-index: 1;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="page-background"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="pulse-light"></div>

    <main class="container" id="main-card">
        <h1>toda go app</h1>
        <p class="subtitle">Premium Experience</p>
        <a href="#" class="cta" id="cta-button">
            Enter Dashboard
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </main>

    <script>
        // Subtle mouse tracking parallax for the card
        const card = document.getElementById('main-card');
        document.body.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg) translateY(-8px)`;
        });

        document.body.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg) translateY(0)`;
        });
    </script>
</body>
</html>
